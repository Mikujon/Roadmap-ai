# ── RoadmapAI Helm Values ─────────────────────────────────────────────────
# Override with: helm upgrade roadmap ./helm/roadmap -f values.prod.yaml

global:
  image:
    registry: ghcr.io/your-org/roadmap
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []

# ── Web (Next.js) ─────────────────────────────────────────────────────────
web:
  enabled: true
  replicaCount: 2

  image:
    name: web

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    host: app.roadmap.ai
    tls:
      secretName: roadmap-web-tls

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 5

  env: {}
  # Override sensitive vars via existingSecret (see below)

# ── Worker (BullMQ + outbox poller) ──────────────────────────────────────
worker:
  enabled: true
  replicaCount: 1

  image:
    name: worker

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 60

  env: {}

# ── Shared secrets (mounted from a Kubernetes Secret) ────────────────────
# Create the secret with:
#   kubectl create secret generic roadmap-secrets \
#     --from-literal=DATABASE_URL=... \
#     --from-literal=CLERK_SECRET_KEY=... \
#     etc.
existingSecret: roadmap-secrets

# ── Environment variables common to both pods ─────────────────────────────
commonEnv:
  NODE_ENV: production
  LOG_LEVEL: info

# ── Pod disruption budgets ────────────────────────────────────────────────
podDisruptionBudget:
  web:
    enabled: true
    minAvailable: 1
  worker:
    enabled: true
    minAvailable: 1

# ── Network policy ────────────────────────────────────────────────────────
networkPolicy:
  enabled: false   # set to true in production

# ── Service account ───────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
