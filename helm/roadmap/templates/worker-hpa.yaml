{{- if and .Values.worker.enabled .Values.worker.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "roadmap.fullname" . }}-worker
  labels:
    {{- include "roadmap.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "roadmap.fullname" . }}-worker
  minReplicas: {{ .Values.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.worker.hpa.maxReplicas }}
  metrics:
    {{- toYaml .Values.worker.hpa.metrics | nindent 4 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10 min — don't kill workers mid-job
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
{{- end }}
