global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: roadmap-web
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /api/metrics
    # Set METRICS_SECRET env var in the app, then add here:
    # authorization:
    #   credentials: <METRICS_SECRET>

  - job_name: roadmap-worker
    static_configs:
      - targets: ['host.docker.internal:9090']
    metrics_path: /metrics
